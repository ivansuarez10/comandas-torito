<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Comandas · El Torito Carnicería</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#9F2629; --rojo-d:#7E1E21; --rojo-l:#B83A3D;
  --negro:#1D1D1F; --carbon:#2C2C2E;
  --bg:#F5F5F7; --card:#FFFFFF; --line:#E6E6EB; --line-2:#F0F0F4;
  --ink:#1D1D1F; --muted:#6E6E73; --muted-2:#9A9AA0;
  --ok:#2E7D52; --warn:#C77A12; --paid:#1F6B45;
  --r:16px; --r-s:12px;
  --sh:0 1px 2px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.05);
  --sh-card:0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
  --sh-l:0 12px 44px rgba(0,0,0,.16);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Inter,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font),system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:16px}
.disp{font-family:var(--font),sans-serif}
.up{text-transform:uppercase;letter-spacing:.04em}
.hidden{display:none!important}

/* ---------- LOGIN ---------- */
#login{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 80% at 50% -10%, #221C18 0%, var(--negro) 60%)}
.login-card{width:100%;max-width:380px;text-align:center;color:#fff}
.login-badge{width:138px;height:138px;border-radius:50%;margin:0 auto 22px;display:block;
  box-shadow:0 0 0 4px rgba(159,38,41,.35), 0 18px 50px rgba(0,0,0,.5)}
.login-card h1{font-family:var(--font);font-weight:600;font-size:15px;letter-spacing:.22em;text-transform:uppercase;color:#E9E2D6}
.login-card .sub{color:#9b9189;font-size:12.5px;margin-top:4px;letter-spacing:.04em}
.roles{display:flex;gap:10px;margin:26px 0 18px}
.role-btn{flex:1;padding:16px 10px;border-radius:var(--r);background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.12);color:#cfc7bd;transition:.15s;text-align:center}
.role-btn .ri{font-size:24px;display:block;margin-bottom:6px}
.role-btn .rt{display:block;font-family:var(--font);text-transform:uppercase;letter-spacing:.06em;font-size:14px;font-weight:600}
.role-btn .rd{display:block;font-size:11px;color:#8c8378;margin-top:2px}
.role-btn.sel{background:var(--rojo);border-color:var(--rojo-l);color:#fff;box-shadow:0 8px 24px rgba(159,38,41,.4)}
.role-btn.sel .rd{color:#f4d7d8}
.pin-wrap{text-align:left;margin-top:6px}
.pin-wrap label{font-size:12px;color:#9b9189;letter-spacing:.04em;margin-bottom:7px;display:block}
.pin-input{width:100%;padding:15px 16px;border-radius:var(--r);background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.14);color:#fff;font-size:22px;letter-spacing:.5em;text-align:center;font-family:var(--font)}
.pin-input::placeholder{letter-spacing:.3em;color:#6b635a;font-size:16px}
.pin-input:focus{outline:none;border-color:var(--rojo-l);background:rgba(159,38,41,.12)}
.login-go{width:100%;margin-top:16px;padding:15px;border-radius:var(--r);background:#fff;color:var(--negro);
  font-family:var(--font);text-transform:uppercase;letter-spacing:.08em;font-weight:600;font-size:15px;transition:.15s}
.login-go:active{transform:scale(.99)}
.login-err{color:#F2A2A4;font-size:13px;margin-top:12px;min-height:18px}
.login-hint{margin-top:20px;font-size:11px;color:#6b635a;letter-spacing:.03em}

/* ---------- APP SHELL ---------- */
.app{min-height:100%;display:flex;flex-direction:column}
.topbar{background:var(--negro);color:#fff;display:flex;align-items:center;gap:12px;padding:11px 16px;
  position:sticky;top:0;z-index:30;padding-top:max(11px,env(safe-area-inset-top))}
.topbar .badge{width:34px;height:34px;border-radius:50%;flex:none}
.topbar .tb-name{font-family:var(--font);font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:15px;line-height:1}
.topbar .tb-sub{font-size:10.5px;color:#9b9189;letter-spacing:.14em;text-transform:uppercase}
.tb-spacer{flex:1}
.tb-pill{font-size:11px;background:rgba(255,255,255,.1);padding:5px 10px;border-radius:999px;display:flex;align-items:center;gap:6px;color:#d9d2c8}
.tb-dot{width:7px;height:7px;border-radius:50%;background:#49C77F;box-shadow:0 0 0 3px rgba(73,199,127,.2)}
.tb-out{font-size:12px;color:#cfc7bd;padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.14)}

.layout{flex:1;display:flex;min-height:0}
.sidebar{display:none}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.view{padding:16px;max-width:1180px;width:100%;margin:0 auto;flex:1}
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:14px}
.view-head h2{font-family:var(--font);font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:24px}
.view-head .vh-sub{color:var(--muted);font-size:13px;margin-top:2px}

/* bottom nav (mobile) */
.botnav{position:sticky;bottom:0;z-index:30;display:flex;background:#fff;border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
.botnav button{flex:1;padding:9px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted-2);font-size:10.5px;font-weight:600}
.botnav button .bi{font-size:21px;line-height:1}
.botnav button.act{color:var(--rojo)}
.botnav .fab{flex:none;width:58px;margin:-14px 6px 0;background:var(--rojo);color:#fff;border-radius:50%;height:58px;
  box-shadow:0 8px 20px rgba(159,38,41,.45);justify-content:center}
.botnav .fab .bi{font-size:26px}

/* ---------- CARDS / UI ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:var(--r-s);
  font-weight:600;font-size:14px;background:var(--ink);color:#fff;transition:.12s}
.btn:active{transform:scale(.98)}
.btn.red{background:var(--rojo)}.btn.red:hover{background:var(--rojo-d)}
.btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn.green{background:var(--ok)}
.btn.lg{padding:15px 20px;font-size:15px;font-family:var(--font);text-transform:uppercase;letter-spacing:.05em}
.btn.block{width:100%}
.btn.sm{padding:8px 12px;font-size:13px}
.btn[disabled]{opacity:.4;pointer-events:none}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;padding:4px 9px;border-radius:999px;font-family:var(--font)}
.chip.nueva{background:#ECE7DE;color:#6b635a}
.chip.cotizar{background:#F3E6CB;color:#7A5410}
.chip.espera{background:#E1E6EB;color:#46515D}
.chip.prep{background:#F6E2E2;color:#8E2326}
.chip.lista{background:#DDEBE3;color:#27543F}
.chip.ruta{background:#EFE6D6;color:#7A5410}
.chip.entregada{background:#E6EAE6;color:#566256}
.chip.cancel{background:#F3DADA;color:#9a3030}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.sect-label{font-family:var(--font);text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:var(--muted);
  font-weight:600;margin:18px 2px 9px;display:flex;align-items:center;gap:8px}
.sect-label .cnt{background:var(--rojo);color:#fff;border-radius:999px;font-size:11px;padding:1px 7px;font-family:var(--font)}

/* order list cards (admin) */
.olist{display:grid;gap:10px}
.ocard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh);
  display:flex;align-items:center;gap:13px;text-align:left;width:100%;transition:.12s}
.ocard:active{transform:scale(.995)}
.ocard:hover{border-color:#d6cdbf}
.ocard .folio{font-family:var(--font);font-weight:700;font-size:15px;color:var(--rojo);width:46px;flex:none}
.ocard .obody{flex:1;min-width:0}
.ocard .oname{display:block;font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ocard .ometa{display:block;font-size:12px;color:var(--muted);margin-top:3px}
.ocard .oright{text-align:right;flex:none}
.ocard .ototal{display:block;font-family:var(--font);font-weight:600;font-size:16px}
.ocard .otime{display:block;font-size:11px;color:var(--muted-2);margin-top:2px}

/* ---------- KANBAN ---------- */
.kanban-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.kanban{display:flex;gap:12px;padding:14px;overflow-x:auto;flex:1;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.kcol{flex:0 0 86%;max-width:340px;scroll-snap-align:center;background:#ECE7DF;border-radius:var(--r);
  display:flex;flex-direction:column;min-height:0;max-height:100%}
.kcol-head{padding:12px 14px 10px;display:flex;align-items:center;gap:8px;position:sticky;top:0}
.kcol-head .kn{font-family:var(--font);text-transform:uppercase;letter-spacing:.05em;font-weight:600;font-size:14px}
.kcol-head .kc{margin-left:auto;background:rgba(0,0,0,.1);border-radius:999px;font-size:12px;padding:1px 9px;font-weight:700}
.kcol.c1{background:#FBF0D9}.kcol.c1 .kn{color:#8a5a06}
.kcol.c2{background:#EBE3F4}.kcol.c2 .kn{color:#6b3fa0}
.kcol.c3{background:#DEECF6}.kcol.c3 .kn{color:#1f5f8a}
.kcol.c4{background:#DCF0E4}.kcol.c4 .kn{color:#1f6b45}
.kcol-body{padding:0 10px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
.kcard{background:#fff;border-radius:12px;padding:13px;box-shadow:0 2px 6px rgba(20,17,15,.1);text-align:left;width:100%;border:1px solid rgba(0,0,0,.04)}
.kcard:active{transform:scale(.98)}
.kcard.locked{opacity:.62;filter:grayscale(.3)}
.kcard .kf{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.kcard .kfolio{font-family:var(--font);font-weight:700;color:var(--rojo);font-size:14px}
.kcard .kname{font-weight:600;font-size:15px}
.kcard .kitems{font-size:12.5px;color:var(--muted);margin-top:2px}
.kcard .ktime{font-size:11px;color:var(--muted-2);margin-top:7px}
.kcard .kbtn{margin-top:10px;width:100%;padding:11px;border-radius:9px;font-family:var(--font);text-transform:uppercase;
  letter-spacing:.05em;font-weight:600;font-size:14px;background:var(--ink);color:#fff}
.kcard .kbtn.amber{background:#C77A12}.kcard .kbtn.blue{background:#1f5f8a}.kcard .kbtn.green{background:#1f6b45}
.kcard .klock{margin-top:9px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;font-weight:600}
.kempty{text-align:center;color:var(--muted-2);font-size:12.5px;padding:18px 8px}

/* ---------- OVERLAY / DETAIL ---------- */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(20,16,14,.5);display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(2px)}
.sheet{background:var(--bg);width:100%;max-width:560px;max-height:94vh;border-radius:20px 20px 0 0;overflow-y:auto;
  box-shadow:var(--sh-l);animation:up .22s ease}
@keyframes up{from{transform:translateY(20px);opacity:.6}to{transform:none;opacity:1}}
.sheet-head{position:sticky;top:0;background:var(--negro);color:#fff;padding:15px 18px;display:flex;align-items:center;gap:12px;z-index:2}
.sheet-head .sh-folio{font-family:var(--font);font-weight:700;color:#fff;font-size:18px}
.sheet-head .sh-name{font-weight:600;font-size:14px;color:#e9e2d6}
.sheet-head .x{margin-left:auto;font-size:15px;color:#cfc7bd;width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.1)}
.sheet-body{padding:16px 18px 26px}

.line{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:10px}
.line.unavail{background:#FAF1F1;border-color:#EBD2D2}
.line-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.line-name{font-weight:600;font-size:15px}
.line-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--rojo);
  background:#F6E7E7;padding:2px 7px;border-radius:6px;font-family:var(--font);margin-left:6px;vertical-align:middle}
.line-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.line-amt{font-family:var(--font);font-weight:600;font-size:17px;white-space:nowrap}
.weigh-row{display:flex;align-items:center;gap:10px;margin-top:11px;flex-wrap:wrap}
.weigh-row .wlab{font-size:12.5px;color:var(--muted);font-weight:600}
.win{width:92px;padding:11px;border:1.5px solid var(--line);border-radius:10px;font-size:18px;text-align:center;font-family:var(--font);background:#fff}
.win:focus{outline:none;border-color:var(--rojo);background:#fff}
.calc{font-size:13px;color:var(--muted)}
.calc b{color:var(--ink);font-family:var(--font);font-size:15px}
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:8px 12px;border-radius:999px;
  border:1.5px solid var(--line);background:#fff;color:var(--ok)}
.toggle.off{color:#b03a3a;border-color:#e7c9c9;background:#FBF1F1}
.toggle .sw{width:34px;height:20px;border-radius:999px;background:var(--ok);position:relative;transition:.15s}
.toggle.off .sw{background:#cf9a9a}
.toggle .sw::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;right:2px;transition:.15s}
.toggle.off .sw::after{right:auto;left:2px}

.total-bar{display:flex;justify-content:space-between;align-items:center;background:var(--negro);color:#fff;
  border-radius:12px;padding:14px 16px;margin:14px 0}
.total-bar .tl{font-family:var(--font);text-transform:uppercase;letter-spacing:.06em;font-size:13px;color:#cfc7bd}
.total-bar .tv{font-family:var(--font);font-weight:600;font-size:24px}

.msgbox{background:#fff;border:1.5px dashed var(--line);border-radius:12px;padding:13px;font-size:13.5px;
  white-space:pre-wrap;color:#33302c;line-height:1.5;margin-top:8px;font-family:var(--font)}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.kv:last-child{border:none}.kv .k{color:var(--muted)}.kv .v{font-weight:600;text-align:right}
.copied{color:var(--ok);font-size:12.5px;font-weight:600;margin-left:8px}

/* ---------- NUEVA COMANDA ---------- */
.field{margin-bottom:13px}
.field label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.03em;display:block;margin-bottom:6px}
.inp{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:15px}
.inp:focus{outline:none;border-color:var(--rojo)}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:600;font-size:14px;color:var(--muted)}
.seg button.on{border-color:var(--rojo);background:#FBF1F1;color:var(--rojo)}
.cat-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.cat-tabs button{flex:none;padding:8px 14px;border-radius:999px;background:#fff;border:1.5px solid var(--line);
  font-size:13px;font-weight:600;color:var(--muted);font-family:var(--font);text-transform:uppercase;letter-spacing:.03em}
.cat-tabs button.on{background:var(--negro);color:#fff;border-color:var(--negro)}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:300px;overflow-y:auto;padding:2px}
.pchip{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:10px 11px;text-align:left;transition:.1s}
.pchip:active{transform:scale(.97);border-color:var(--rojo)}
.pchip .pn{font-weight:600;font-size:13.5px;line-height:1.2}
.pchip .pp{font-size:12px;color:var(--rojo);font-family:var(--font);font-weight:600;margin-top:3px}
.pchip .pu{font-size:10.5px;color:var(--muted-2)}
.cartline{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:7px}
.cartline .cn{flex:1;min-width:0}
.cartline .cn b{font-weight:600;font-size:14px}
.cartline .cn small{display:block;color:var(--muted);font-size:11.5px}
.qty{display:flex;align-items:center;gap:0;border:1.5px solid var(--line);border-radius:9px;overflow:hidden}
.qty button{width:32px;height:34px;background:#F5F1EA;font-size:18px;font-weight:600;color:var(--ink)}
.qty input{width:46px;height:34px;border:none;text-align:center;font-size:15px;font-family:var(--font);border-left:1.5px solid var(--line);border-right:1.5px solid var(--line)}
.qty input:focus{outline:none}
.cartline .rm{color:var(--muted-2);font-size:18px;width:30px;height:30px}
.cart-empty{text-align:center;color:var(--muted-2);font-size:13px;padding:22px;border:1.5px dashed var(--line);border-radius:12px}

/* catalogo */
.cat-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.cat-table th{font-family:var(--font);text-transform:uppercase;letter-spacing:.04em;font-size:11.5px;color:var(--muted);
  text-align:left;padding:10px 12px;background:#FAF7F2;border-bottom:1px solid var(--line)}
.cat-table td{padding:10px 12px;border-bottom:1px solid var(--line-2);font-size:13.5px}
.cat-table tr:last-child td{border:none}
.cat-table .price{font-family:var(--font);font-weight:600;text-align:right}
.cat-table .catrow td{background:var(--negro);color:#fff;font-family:var(--font);text-transform:uppercase;letter-spacing:.08em;font-size:12px;font-weight:600}
.wtag{font-size:10px;font-weight:700;color:var(--rojo);background:#F6E7E7;padding:2px 6px;border-radius:5px;font-family:var(--font)}

/* report */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.kpi .kl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;font-family:var(--font)}
.kpi .kvv{font-family:var(--font);font-weight:600;font-size:26px;margin-top:4px}
.kpi .kvv small{font-size:14px;color:var(--muted)}
.rank{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:6px 14px;box-shadow:var(--sh)}
.rank .rrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.rank .rrow:last-child{border:none}
.rank .rbar{flex:1;height:7px;background:#EFEAE1;border-radius:99px;overflow:hidden}
.rank .rbar i{display:block;height:100%;background:var(--rojo);border-radius:99px}
.rank .rv{font-family:var(--font);font-weight:600;white-space:nowrap;font-size:13px}

.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state .es-ic{font-size:42px;opacity:.5}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;z-index:90;background:var(--ink);color:#fff;
  padding:12px 18px;border-radius:999px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-l);opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1;bottom:96px}

@media(min-width:760px){
  .prod-grid{grid-template-columns:1fr 1fr 1fr}
  .kpis{grid-template-columns:repeat(4,1fr)}
}
@media(min-width:900px){
  .botnav{display:none}
  .sidebar{display:flex;flex-direction:column;width:212px;background:#fff;border-right:1px solid var(--line);padding:14px 12px;gap:4px;flex:none}
  .sidebar .snav{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;color:var(--muted);font-weight:600;font-size:14px;width:100%;text-align:left}
  .sidebar .snav .si{font-size:19px;width:22px;text-align:center}
  .sidebar .snav.act{background:#FBF1F1;color:var(--rojo)}
  .sidebar .snav:hover:not(.act){background:#F6F2EC}

  .kanban{display:grid;grid-template-columns:repeat(4,1fr);overflow:visible}

}

.kmove{display:flex;gap:8px;margin-top:13px}

.np-scrim{position:fixed;inset:0;z-index:79;background:rgba(20,16,14,.26)}

.np-head{display:flex;align-items:flex-end;justify-content:space-between;padding:4px 8px 13px;color:#fff;gap:12px}

/* ================= TEMA APPLE ================= */
body{font-family:var(--font);background:var(--bg);color:var(--ink);letter-spacing:-.011em}
.disp{font-family:var(--font)}
.up{letter-spacing:.02em}
[class].kfolio,.tv,.ototal,.oitem-amt,.np-val,.kvv,.numbox,.line-amt,.rv,.win{font-variant-numeric:tabular-nums;letter-spacing:-.02em}
/* headers light + vibrancy */
.topbar,.ctop{background:rgba(255,255,255,.8);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);color:var(--ink);border-bottom:.5px solid var(--line);box-shadow:none}
.topbar .tb-logo,.ctop-logo{filter:none}
.topbar .tb-sub,.ctop-sub{color:var(--muted)}
.topbar .tb-out,.ctop-out{color:var(--ink);border:.5px solid var(--line);background:#fff;box-shadow:var(--sh)}
.tb-pill,.ctop-sync{background:#EFEFF3;color:var(--muted)}
.tb-dot{background:#34C759;box-shadow:0 0 0 3px rgba(52,199,89,.18)}
/* login light */
#login{background:radial-gradient(120% 80% at 50% -10%, #FFFFFF 0%, var(--bg) 60%)}
.login-card{color:var(--ink)}
.login-badge{box-shadow:0 14px 44px rgba(0,0,0,.16)}
.login-card h1{color:var(--ink);letter-spacing:.16em}
.login-card .sub{color:var(--muted)}
.role-btn{background:#fff;border:.5px solid var(--line);color:var(--ink);box-shadow:var(--sh-card);border-radius:20px}
.role-btn .ri,.role-btn .rd{color:var(--muted)}
.role-btn.sel{background:var(--rojo);border-color:var(--rojo);color:#fff;box-shadow:0 12px 30px rgba(159,38,41,.32)}
.role-btn.sel .ri,.role-btn.sel .rd,.role-btn.sel .rt{color:#fff}
.pin-wrap label{color:var(--muted)}
.pin-input{background:#fff;border:.5px solid var(--line);color:var(--ink);box-shadow:var(--sh);border-radius:16px}
.pin-input::placeholder{color:var(--muted-2)}
.pin-input:focus{border-color:var(--rojo);background:#fff;box-shadow:0 0 0 4px rgba(159,38,41,.12)}
.login-go{background:var(--rojo);color:#fff;box-shadow:0 10px 26px rgba(159,38,41,.3);border-radius:16px;letter-spacing:.02em}
.login-hint{color:var(--muted-2)}
.login-err{color:var(--rojo)}
/* titles sentence-case bold */
.view-head h2{text-transform:none;letter-spacing:-.03em;font-weight:700;font-size:30px}
.sect-label{color:var(--muted)}
.sect-label .cnt{background:var(--rojo)}
/* cards & surfaces soft */
.card,.ocard,.oitem,.osum,.kpi,.rank,.cat-table{border:.5px solid var(--line);box-shadow:var(--sh-card);border-radius:18px}
.ocard:hover{border-color:var(--line);box-shadow:0 2px 6px rgba(0,0,0,.05),0 12px 30px rgba(0,0,0,.08)}
.ocard .folio,.kfolio,.sh-folio{color:var(--rojo)}
/* kanban light (iOS grouped) */
.kcol,.kcol.c1,.kcol.c2,.kcol.c3,.kcol.c4{background:rgba(237,237,241,.78);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);border-top:none;border-radius:22px}
.kcol-head{padding:15px 16px 9px}
.kcard2{border:none;box-shadow:var(--sh-card);border-radius:18px}
.kmv{background:#EFEFF3;color:var(--ink);border:none;box-shadow:none}
.kmv.fwd{background:var(--rojo);color:#fff;box-shadow:0 6px 16px rgba(159,38,41,.26)}
.kmv.del{background:#fff;color:#C0392B;border:.5px solid #F1D2D2;box-shadow:var(--sh)}
.knote{background:#F3F3F6;color:var(--muted);border-radius:12px}
.kpaid{color:var(--paid)} .kwait{color:var(--muted)}
.chip{border-radius:8px;font-family:var(--font);letter-spacing:.01em}
/* total bar light */
.total-bar{background:#fff;border:.5px solid var(--line);box-shadow:var(--sh-card);border-radius:18px}
.total-bar .tl{color:var(--muted);letter-spacing:0;text-transform:none;font-weight:500}
.total-bar .tv{color:var(--ink)}
/* sheets (iOS modal) */
.sheet{background:var(--bg);border-radius:24px 24px 0 0}
.sheet-head{background:rgba(255,255,255,.82);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);color:var(--ink);border-bottom:.5px solid var(--line)}
.sheet-head .sh-name{color:var(--muted)}
.sheet-head .x{background:#EAEAEF;color:var(--muted)}
.note-banner{background:#fff;border:.5px solid var(--line);box-shadow:var(--sh);border-radius:14px}
/* buttons apple */
.btn{border-radius:13px;box-shadow:var(--sh);font-weight:600}
.btn.red{box-shadow:0 6px 18px rgba(159,38,41,.24)}
.btn.green{box-shadow:0 6px 18px rgba(46,125,82,.22)}
.btn.ghost{border:.5px solid var(--line);box-shadow:var(--sh)}
.btn.lg{border-radius:15px;text-transform:none;letter-spacing:-.01em;font-weight:700}
/* edit numbox */
.numbox{border:1.5px solid var(--line);box-shadow:var(--sh);background:#fff;border-radius:14px}
.numbox.active{border-color:var(--rojo);box-shadow:0 0 0 4px rgba(159,38,41,.12)}
.add-prod{border:1.5px dashed var(--line);border-radius:16px;box-shadow:none}
/* numpad popup LIGHT (iOS keypad) */
.np-scrim{background:rgba(0,0,0,.32);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.np-pop{background:rgba(250,250,252,.96);-webkit-backdrop-filter:saturate(180%) blur(30px);backdrop-filter:saturate(180%) blur(30px);border:.5px solid rgba(0,0,0,.06);border-radius:30px;box-shadow:0 26px 80px rgba(0,0,0,.34)}
.np-label{color:var(--muted)}
.np-val{color:var(--ink)}
.np-key{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);border-radius:16px;font-weight:600;font-family:var(--font)}
.np-key:active{background:#ECECEF;transform:scale(.96)}
.np-key.del{background:#E8E8ED;color:var(--ink)}
.np-key.ok{background:var(--rojo);color:#fff;box-shadow:0 8px 20px rgba(159,38,41,.3)}
/* nav light */
.botnav{background:rgba(255,255,255,.88);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--line)}
.botnav .fab{box-shadow:0 10px 26px rgba(159,38,41,.38)}
.sidebar{background:#fff;border-right:.5px solid var(--line)}
.sidebar .snew{box-shadow:0 6px 16px rgba(159,38,41,.24)}
/* tables/segments */
.cat-table .catrow td{background:#F2F2F6;color:var(--ink);letter-spacing:.04em}
.cat-tabs button.on,.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.confirm-box{border-radius:26px;box-shadow:var(--sh-l)}
.kpi .kvv,.view-head h2{letter-spacing:-.02em}
.kmv.go{background:var(--ok);color:#fff;box-shadow:0 6px 16px rgba(46,125,82,.22)}
.cmt-field{margin:4px 0 16px}
.cmt-label{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);font-weight:600;margin-bottom:8px}
.cmt-label svg{color:var(--rojo)}
.cmt-area{width:100%;resize:none;font-size:15px;line-height:1.45;padding:13px 14px;border-radius:14px;box-shadow:var(--sh)}
.cmt-area:focus{outline:none;border-color:var(--rojo);box-shadow:0 0 0 4px rgba(159,38,41,.1)}
/* ===== quick wins ===== */
.toast{display:flex;align-items:center;gap:14px}
.t-undo{display:none;align-items:center;background:transparent;border:none;color:#FF7A7A;font-weight:700;font-size:14px;padding:2px 2px;cursor:pointer}
.ctop-snd{flex:none;width:38px;height:38px;border-radius:11px;border:.5px solid var(--line);background:#fff;box-shadow:var(--sh);color:var(--muted-2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.ctop-snd.on{color:var(--rojo)}
.kdot{width:9px;height:9px;border-radius:50%;background:var(--rojo);flex:none;animation:kpulse 1.6s ease-in-out infinite}
@keyframes kpulse{0%,100%{box-shadow:0 0 0 0 rgba(159,38,41,.45)}50%{box-shadow:0 0 0 6px rgba(159,38,41,0)}}
.kcol.alerted{animation:colflash .9s ease 2}
@keyframes colflash{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 3px rgba(159,38,41,.4)}}
.kcard2.urgent{box-shadow:0 1px 3px rgba(0,0,0,.05),0 10px 26px rgba(159,38,41,.16)}
.ktime.urg{color:var(--rojo);font-weight:700;display:inline-flex;align-items:center;gap:4px}
.kempty{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted-2);font-size:13.5px;padding:34px 12px;font-weight:500}
.ke-ic{color:#CACAD0}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}
/* ===== dashboard ===== */
.kpi.accent{background:var(--rojo)}
.kpi.accent .kl{color:#f3d2d3} .kpi.accent .kvv{color:#fff}
.act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.act-card{background:#fff;border:.5px solid var(--line);border-radius:16px;box-shadow:var(--sh-card);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:transform .12s}
.act-card:active{transform:scale(.97)}
.act-ic{color:var(--rojo)}
.act-n{font-weight:800;font-size:24px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.act-l{font-size:12px;color:var(--muted);font-weight:500;text-align:center}
.link-btn{margin-left:auto;background:transparent;border:none;color:var(--rojo);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:2px;cursor:pointer;text-transform:none;letter-spacing:0}
.chart-card{padding:16px 16px 12px}
.chart-top{margin-bottom:14px}

.chart-big{font-weight:800;font-size:26px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.chart{display:flex;align-items:flex-end;gap:8px;height:120px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.chart-bar{width:100%;max-width:36px;background:#E4E4EA;border-radius:7px;min-height:3px}
.chart-bar.today{background:var(--rojo)}
.chart-lbl{font-size:11px;color:var(--muted-2);font-weight:600}
.rk-name{flex:none;width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
.hist-link{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;width:100%;text-align:left}

/* ============ PARSER DE PEDIDO (autollenar desde texto pegado) ============ */

const _norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
function _extractQty(line){
  const m=line.match(/(\d+(?:[.,]\d+)?)/);
  const qty=m?parseFloat(m[1].replace(',','.')):1;
  const rest=line.replace(/\d+(?:[.,]\d+)?/g,' ')
    .replace(/\b(libras?|lbs?|lb|kilos?|kg|de|del|la|el|los|las|una?|unos?|unas?|porfa|porfis|por favor|ya|me das|dame|quiero|necesito|y|con|mi orden|orden|pedido)\b/gi,' ')
    .trim();
  return {qty:qty>0?qty:1, rest};
}
function _matchProduct(rest){
  const n=_norm(rest); if(n.replace(/\s/g,'').length<2) return null;
  for(const [keys,prod] of ALIASES){ for(const k of keys){ if(n.includes(_norm(k))) return prod; } }
  // coincidencia difusa por tokens
  let best=null,bs=0;
  for(const p of PRODUCTS){ const b=_norm(p.name); const A=n.split(' '),B=b.split(' ');
    let c=0; A.forEach(t=>{ if(t.length>2 && B.some(u=>u.includes(t)||t.includes(u))) c++; });
    const sc=c/Math.max(A.length,B.length); if(sc>bs){bs=sc;best=p.name;} }
  return bs>=0.5?best:null;
}
function parseOrderText(text){
  const lines=(text||'').split(/[\n\r]+/).map(l=>l.trim()).filter(Boolean);
  const items=[], unknown=[];
  for(const raw of lines){
    if(/^(hola|buenas|buenos|gracias|mi orden|orden seria|orden sería|pedido|por favor)\b/i.test(raw) && !/\d/.test(raw) && raw.split(' ').length<4) continue;
    const {qty,rest}=_extractQty(raw);
    const name=_matchProduct(rest);
    if(name){ const ex=items.find(x=>x.name===name); if(ex) ex.qty+=qty; else items.push({name,qty}); }
    else if(_norm(raw).replace(/\s/g,'').length>1) unknown.push(raw);
  }
  return {items, unknown};
}

function load(){ try{const r=localStorage.getItem(KEY); state=r?JSON.parse(r):seed(); }catch(e){state=seed();} if(!state.history) state.history=[]; if(!state.clients) state.clients=[]; }
function save(){ if(USE_SUPA){ dbSyncAll(); return; } localStorage.setItem(KEY,JSON.stringify(state)); lastPing=Date.now(); localStorage.setItem("ct_v2_ping",lastPing); bc&&bc.postMessage("sync"); }
const dayStart=ts=>{ const d=new Date(ts); d.setHours(0,0,0,0); return d.getTime(); };
// Las comandas "Lista para entrega" se retiran del tablero al día siguiente, pero quedan en histórico.
function archiveStaleListas(){
  if(!state||!state.history) return;
  const today=dayStart(Date.now()); const keep=[]; let changed=false;
  const term=['lista','entregada','cancelada'];
  state.orders.forEach(o=>{
    const ref=o.listaAt||o.paidAt||o.createdAt;
    if(term.includes(o.status) && dayStart(ref)<today){ o.archived=true; o.archivedAt=Date.now(); state.history.push(o); changed=true; }
    else keep.push(o);
  });
  if(changed){ state.orders=keep; save(); }
}
const allOrders=()=> state.orders.concat(state.history||[]);

function toRow(o){ return {id:o.id,folio:o.folio,client_name:o.clientName,phone:o.phone,zone:o.zone,addr:o.addr,delivery:o.delivery,shipping:o.shipping||0,note:o.note,status:o.status,paid:!!o.paid,paid_at:o.paidAt||null,lista_at:o.listaAt||null,archived:!!o.archived,archived_at:o.archivedAt||null,created_at:o.createdAt,items:o.items||[],hist:o.hist||[]}; }
function fromRow(r){ return {id:r.id,folio:r.folio,clientName:r.client_name,phone:r.phone,zone:r.zone,addr:r.addr,delivery:r.delivery,shipping:Number(r.shipping)||0,note:r.note,status:r.status,paid:!!r.paid,paidAt:r.paid_at,listaAt:r.lista_at,archived:!!r.archived,archivedAt:r.archived_at,createdAt:Number(r.created_at),items:r.items||[],hist:r.hist||[]}; }
async function dbFetch(){
  const {data,error}=await supa.from('orders').select('*');
  if(error){ console.warn('Supabase fetch:',error.message); return; }
  const all=(data||[]).map(fromRow);
  state.orders=all.filter(o=>!o.archived).sort((a,b)=>b.createdAt-a.createdAt);
  state.history=all.filter(o=>o.archived);
  state.seq=Math.max(0, ...all.map(o=>parseInt(o.folio,10)||0))+1;
  // clientes (si la tabla ya existe)
  try{ const {data:cl,error:ce}=await supa.from('clients').select('*'); if(!ce && cl) state.clients=cl.map(fromRowC); }catch(e){}
}
function toRowC(c){ return {phone:_digits(c.phone), name:c.name||'', zone:c.zone||'', addr:c.addr||'', note:c.note||'', created_at:c.createdAt||Date.now()}; }
function fromRowC(r){ return {phone:r.phone, name:r.name, zone:r.zone, addr:r.addr, note:r.note, createdAt:Number(r.created_at)||0}; }
function upsertClient(c){
  if(!c||_digits(c.phone).length<4||!c.name) return;
  const np=_digits(c.phone); if(!state.clients) state.clients=[];
  const i=state.clients.findIndex(x=>_digits(x.phone)===np);
  const rec={phone:np, name:c.name, zone:c.zone||'', addr:c.addr||'', note:(i>=0?state.clients[i].note:'')||'', createdAt:(i>=0?state.clients[i].createdAt:Date.now())};
  if(i>=0) state.clients[i]=rec; else state.clients.push(rec);
  if(USE_SUPA) supa.from('clients').upsert(toRowC(rec)).then(({error})=>{ if(error) console.warn('Supabase client upsert:',error.message); });
}
async function seedToDb(){ const s=seed(); const rows=[...s.orders,...(s.history||[])].map(toRow); const {error}=await supa.from('orders').insert(rows); if(error) console.warn('Supabase seed:',error.message); }
let syncT=null;
function dbSyncAll(){ clearTimeout(syncT); syncT=setTimeout(async()=>{
  const rows=[...state.orders,...(state.history||[])].map(toRow);
  const {error}=await supa.from('orders').upsert(rows); if(error) console.warn('Supabase upsert:',error.message);
},120); }
function dbDelete(id){ if(USE_SUPA) supa.from('orders').delete().eq('id',id).then(({error})=>{ if(error) console.warn('Supabase delete:',error.message); }); }
let refetchT=null;
function scheduleRefetch(){ clearTimeout(refetchT); refetchT=setTimeout(async()=>{ await dbFetch(); lastSync=Date.now(); rerender(); },250); }
async function initSupa(){
  supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  USE_SUPA=true; state={orders:[],history:[],clients:[],seq:43};
  await dbFetch();
  if(state.orders.length===0 && state.history.length===0){ await seedToDb(); await dbFetch(); }
  archiveStaleListas(); rerender();
  supa.channel('orders-rt').on('postgres_changes',{event:'*',schema:'public',table:'orders'},()=>scheduleRefetch()).subscribe();
}

function parsePreviewHtml(){

  const ok=(lp.items||[]).map(it=>{ const p=prodByName(it.name);
    return `<div class="pp-row ok"><span class="pp-ic">${ic('check',14)}</span><span class="pp-name">${esc(it.name)}</span><span class="pp-qty">× ${it.qty}${p&&p.price!=null?' · '+money(it.qty*p.price):''}</span></div>`;}).join("");
  const unk=(lp.unknown||[]).map(l=>`<div class="pp-row warn"><span class="pp-ic">${ic('clock',14)}</span><span class="pp-name">${esc(l)}</span><span class="pp-qty">revisar</span></div>`).join("");
  return `<div class="parse-prev">
    <div class="pp-head">${ic('eye',14)} Lo que entendí <span class="pp-src">${lp.ai?'IA':'local'}</span></div>
    ${ok||`<div class="pp-empty">No reconocí productos en el texto.</div>`}
    ${unk?`<div class="pp-sep">${ic('clock',13)} No estoy seguro de estas líneas — revísalas y agrégalas a mano si hace falta:</div>${unk}`:''}
    <div class="pp-note">Compara con tu mensaje de arriba. Si algo falta o quedó mal, tócalo en <b>Productos</b> o ajústalo abajo en la comanda.</div>
  </div>`;
}

function draftTotal(){ return draft.items.reduce((s,it)=>{const p=prodById(it.prodId);return s+(p.price?it.qty*p.price:0);},0); }
function syncDraft(){
  const g=(id)=>{const e=$("#"+id);return e?e.value:"";};
  draft.clientName=g("dName")||draft.clientName; draft.phone=g("dPhone")||draft.phone;
  draft.zone=g("dZone")||draft.zone; draft.addr=g("dAddr")||draft.addr; draft.note=g("dNote")||draft.note;
  const sh=$("#dShip"); if(sh) draft.shipping=parseFloat(sh.value)||0;
}
function initNueva(){
  // re-render only dynamic parts by re-rendering view (keeps simple)
  const v=$(".view"); if(v) v.innerHTML=adminNueva();
  renderCart();
  ["dName","dPhone","dZone","dAddr","dNote","dShip"].forEach(id=>{const e=$("#"+id); if(e) e.oninput=()=>{syncDraft(); const dt=$("#draftTotal"); if(dt) dt.textContent=money(draftGrand());};});
  const pt=$("#dPaste"); if(pt) pt.oninput=()=>{ draft.pasteText=pt.value; }; // no se borra al re-renderizar
  const pp=$("#dPastePhone"); if(pp) pp.oninput=()=>{ draft.pastePhone=pp.value; };
  const ph=$("#dPhone"); if(ph) ph.onblur=()=>{ syncDraft(); const c=clientByPhone(ph.value); if(c&&c.name&&!($("#dName")||{}).value){ draft.phone=ph.value; draft.clientName=c.name; draft.zone=c.zone||draft.zone; draft.addr=c.addr||draft.addr; initNueva(); toast('Cliente identificado: '+c.name); } };
}
function renderCart(){
  const c=$("#cart"); if(!c) return;
  const cc=$("#cartCount"); if(cc) cc.textContent=draft.items.length;
  if(!draft.items.length){ c.innerHTML=`<div class="cart-empty">Toca un producto para agregarlo</div>`; return; }
  c.innerHTML=draft.items.map((it,i)=>{const p=prodById(it.prodId);
    return `<div class="cartline">
      <div class="cn"><b>${esc(p.name)}</b><small>${p.price==null?'a cotizar':money(p.price)+' / '+(p.unit==='Libra'?'lb':p.unit)}${p.weigh?' · validar peso':''}</small></div>
      <div class="qty"><button onclick="chQty(${i},-1)">–</button><input value="${it.qty}" inputmode="decimal" onchange="setQty(${i},this.value)"><button onclick="chQty(${i},1)">+</button></div>
      <button class="rm" onclick="rmItem(${i})">${ic('x',16)}</button></div>`;}).join("");
  const dt=$("#draftTotal"); if(dt) dt.textContent=money(draftGrand());
}
function addItem(id){ const ex=draft.items.find(it=>it.prodId===id); if(ex){ex.qty++;} else draft.items.push({prodId:id,qty:1}); renderCart(); }
function chQty(i,d){ draft.items[i].qty=Math.max(0.25,Math.round((draft.items[i].qty+d)*100)/100); renderCart(); }
function setQty(i,v){ const n=parseFloat(v); draft.items[i].qty=isNaN(n)||n<=0?1:n; renderCart(); }
function rmItem(i){ draft.items.splice(i,1); renderCart(); }
function submitOrder(){
  syncDraft();
  if(!draft.clientName.trim()){ toast("Falta el nombre del cliente"); return; }
  if(!draft.items.length){ toast("Agrega al menos un producto"); return; }
  const folio=String(state.seq++).padStart(4,"0");
  const o={ id:"o"+folio, folio, clientName:draft.clientName.trim(), phone:draft.phone, zone:draft.zone, addr:draft.addr,
    delivery:draft.delivery, shipping:draft.delivery==='envio'?(+draft.shipping||0):0, note:draft.note, status:"cotizar", createdAt:Date.now(), paid:false,
    items:draft.items.map(it=>{const p=prodById(it.prodId);
      return {prodId:p.id,name:p.name,unit:p.unit,price:p.price,weigh:p.weigh,qty:it.qty,available:true,weight:null,note:""};}),
    hist:[{s:"cotizar",at:Date.now()}] };
  state.orders.unshift(o); save();
  upsertClient({phone:draft.phone, name:draft.clientName.trim(), zone:draft.zone, addr:draft.addr});
  toast("Comanda #"+folio+" enviada al carnicero"); go("bandeja");
}
/* ----- AUTOLLENAR (pegar pedido) + clientes por teléfono ----- */
const _digits=p=>(p||'').replace(/\D/g,'');
function clientByPhone(phone){
  const np=_digits(phone); if(np.length<4) return null;
  if(state.clients){ const c=state.clients.find(x=>_digits(x.phone)===np); if(c) return c; }
  const o=allOrders().find(x=>_digits(x.phone)===np);
  return o? {phone:o.phone,name:o.clientName,zone:o.zone,addr:o.addr} : null;
}
// IA (Claude/OpenAI vía Edge Function). Timeout 7s. Si falla → throw y caemos al parser local.
async function aiParse(text){
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),7000);
  try{
    const r=await fetch(SUPA_URL+'/functions/v1/parse-order',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY,'apikey':SUPA_KEY},
      body:JSON.stringify({text, catalog:PRODUCTS.map(p=>p.name)}),
      signal:ctrl.signal
    });
    clearTimeout(to);
    if(!r.ok) throw new Error('http '+r.status);
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    const items=(d.items||[]).filter(it=>prodByName(it.name)); // solo nombres válidos del catálogo
    if(!items.length && (d.items||[]).length) throw new Error('sin coincidencias'); // respuesta inútil → fallback
    return {items, unknown:d.unknown||[]};
  }catch(e){ clearTimeout(to); throw e; }
}
async function autollenarPedido(btn){
  const text=($("#dPaste")||{}).value||'';
  const phone=(($("#dPastePhone")||{}).value||'').trim();
  draft.pasteText=text; draft.pastePhone=phone; // preservar lo pegado (no se borra al re-renderizar)
  if(!text.trim() && !phone){ toast("Pega el pedido o el teléfono primero"); return; }
  let items=[], unknown=[], usedAI=false;
  if(text.trim()){
    const old=btn?btn.innerHTML:''; if(btn){ btn.disabled=true; btn.innerHTML=ic('clock',17)+' Leyendo…'; }
    try{ const r=await aiParse(text); items=r.items; unknown=r.unknown; usedAI=true; }
    catch(e){ const r=parseOrderText(text); items=r.items; unknown=r.unknown; } // fallback local
    if(btn){ btn.disabled=false; btn.innerHTML=old; }
    draft.lastParse={items, unknown, ai:usedAI}; // alimenta el panel de validación
  }
  // fusionar con lo que ya estaba (no pisar productos agregados a mano): los del texto se vuelven la base
  if(items.length){ draft.items=items.map(it=>{const p=prodByName(it.name); return p?{prodId:p.id,qty:it.qty}:null;}).filter(Boolean); }
  let foundClient=false;
  if(phone){ draft.phone=phone; const c=clientByPhone(phone); if(c){ draft.clientName=c.name||draft.clientName; draft.zone=c.zone||draft.zone; draft.addr=c.addr||draft.addr; foundClient=true; } }
  initNueva();
  const cart=$("#cart"); if(cart) cart.scrollIntoView({block:'center',behavior:'smooth'});
  let msg=items.length? (items.length+" productos cargados"+(usedAI?" (IA)":"")) : "No reconocí productos";
  if(unknown.length) msg+=" · "+unknown.length+" por revisar";
  if(foundClient) msg+=" · cliente identificado";
  else if(phone) msg+=" · cliente nuevo";
  toast(msg);
}

function adminClientes(){

  allOrders().forEach(o=>{ const k=o.clientName; if(!map[k]) map[k]={name:k,phone:o.phone,zone:o.zone,addr:o.addr,orders:[],total:0,prods:{}};
    map[k].orders.push(o); if(o.status==="entregada"||o.paid) map[k].total+=fullTotal(o);
    o.items.forEach(it=>map[k].prods[it.name]=(map[k].prods[it.name]||0)+1); });
  const cls=Object.values(map).sort((a,b)=>b.total-a.total);

    <div class="olist">${cls.map(c=>{

            <div style="font-size:11px;color:var(--muted-2)">${c.orders.length} comandas</div></div>
        </div>
        ${top?`<div style="font-size:12.5px;color:var(--muted);margin-top:9px">🛒 Compra seguido: <b style="color:var(--ink)">${esc(top)}</b></div>`:""}

function adminResumen(g){
  const now=Date.now(), today=dayStart(now), day=86400000;
  const refTs=o=>o.paidAt||o.listaAt||o.createdAt;
  const done=allOrders().filter(o=>o.status==="entregada"||o.paid);
  const todayDone=done.filter(o=>dayStart(refTs(o))===today);
  const ventasHoy=todayDone.reduce((s,o)=>s+fullTotal(o),0);
  const ticket=todayDone.length?ventasHoy/todayDone.length:0;
  const activas=state.orders.filter(o=>["cotizar","espera_pago","preparacion","lista","en_ruta"].includes(o.status)).length;
  const dN=new Date(now);
  const monthDone=done.filter(o=>{const d=new Date(refTs(o)); return d.getMonth()===dN.getMonth()&&d.getFullYear()===dN.getFullYear();});
  const ventasMes=monthDone.reduce((s,o)=>s+fullTotal(o),0);
  const DOW=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const days=[]; for(let i=6;i>=0;i--){ const ds=today-i*day, dt=new Date(ds);
    const val=done.filter(o=>dayStart(refTs(o))===ds).reduce((s,o)=>s+fullTotal(o),0);
    days.push({label:DOW[dt.getDay()][0], full:DOW[dt.getDay()]+" "+dt.getDate(), val, today:ds===today}); }
  const maxV=Math.max(1,...days.map(d=>d.val));
  const byProd={}, byCli={};
  monthDone.forEach(o=>{ byCli[o.clientName]=(byCli[o.clientName]||0)+fullTotal(o);
    o.items.forEach(it=>{ if(it.available&&it.price!=null) byProd[it.name]=(byProd[it.name]||0)+lineAmount(it); }); });
  const rank=(obj,n)=>{const e=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);const mx=e.length?e[0][1]:1;
    return e.map(([k,v])=>`<div class="rrow"><span class="rk-name">${esc(k)}</span><span class="rbar"><i style="width:${Math.max(6,v/mx*100)}%"></i></span><span class="rv">${money(v)}</span></div>`).join("");};
  const dateStr=new Date(now).toLocaleDateString("es-HN",{weekday:"long",day:"numeric",month:"long"});
  return `<div class="view-head"><div><h2>Resumen</h2><div class="vh-sub" style="text-transform:capitalize">${dateStr}</div></div></div>
    <div class="kpis">
      <div class="kpi accent"><div class="kl">Ventas de hoy</div><div class="kvv">${money(ventasHoy)}</div></div>
      <div class="kpi"><div class="kl">Comandas hoy</div><div class="kvv">${todayDone.length}</div></div>
      <div class="kpi"><div class="kl">Ticket promedio</div><div class="kvv">${money(ticket)}</div></div>
      <div class="kpi"><div class="kl">Activas ahora</div><div class="kvv">${activas}</div></div>
    </div>
    <div class="sect-label">Necesita tu mano</div>
    <div class="act-grid">
      <button class="act-card" onclick="go('bandeja')"><span class="act-ic">${ic('cash',20)}</span><span class="act-n">${g.cobrar.length}</span><span class="act-l">Por cobrar</span></button>
      <button class="act-card" onclick="go('bandeja')"><span class="act-ic">${ic('truck',20)}</span><span class="act-n">${g.entregar.length}</span><span class="act-l">Por entregar</span></button>
    </div>
    <div class="carn-info" onclick="go('bandeja')">${ic('knife',15)} <span>Con el carnicero: <b>${g.proceso.length}</b> en proceso (cotizar / preparación)</span></div>
    <div class="sect-label">Ventas · últimos 7 días <button class="link-btn" onclick="go('reporte')">Reporte del mes ${ic('right',13)}</button></div>
    <div class="card chart-card">
      <div class="chart-top"><div class="kl">Vendido este mes</div><div class="chart-big">${money(ventasMes)}</div></div>
      <div class="chart">${days.map(d=>`<div class="chart-col"><div class="chart-bar ${d.today?'today':''}" style="height:${Math.max(3,Math.round(d.val/maxV*100))}%" title="${d.full}: ${money(d.val)}"></div><span class="chart-lbl">${d.label}</span></div>`).join("")}</div>
    </div>
    <div class="sect-label">Top productos</div><div class="rank">${rank(byProd,5)||'<div class="kempty">Sin datos</div>'}</div>
    <div class="sect-label">Top clientes</div><div class="rank">${rank(byCli,4)||'<div class="kempty">Sin datos</div>'}</div>
    <div class="sect-label">Histórico</div>
    <button class="hist-link card" onclick="go('historico')"><span class="act-ic">${ic('history',20)}</span><span class="hist-tx"><b>${(state.history||[]).length} comandas archivadas</b><small>Entregadas de días anteriores</small></span><span class="hist-ch">${ic('right',18)}</span></button>
    <div style="height:24px"></div>`;
}

function adminReporte(){
  const done=allOrders().filter(o=>o.status==="entregada"||o.paid);
  const total=done.reduce((s,o)=>s+fullTotal(o),0);
  const tick=done.length?total/done.length:0;
  const byProd={}, byCli={};
  done.forEach(o=>{ byCli[o.clientName]=(byCli[o.clientName]||0)+fullTotal(o);
    o.items.forEach(it=>{ byProd[it.name]=(byProd[it.name]||0)+lineAmount(it); }); });
  const rank=(obj)=>{const e=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,6);const mx=e.length?e[0][1]:1;
    return e.map(([k,v])=>`<div class="rrow"><span style="flex:none;width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(k)}</span><span class="rbar"><i style="width:${Math.max(6,v/mx*100)}%"></i></span><span class="rv">${money(v)}</span></div>`).join("");};
  return `<div class="view-head"><div><button class="back-btn btn-ic" onclick="go('resumen')">${ic('left',16)} Resumen</button><h2>Reporte de ventas</h2><div class="vh-sub">Este mes · interno</div></div></div>
    <div class="kpis">
      <div class="kpi"><div class="kl">Total vendido</div><div class="kvv">${money(total)}</div></div>
      <div class="kpi"><div class="kl">Comandas</div><div class="kvv">${done.length}</div></div>
      <div class="kpi"><div class="kl">Ticket prom.</div><div class="kvv">${money(tick)}</div></div>

function openAdminOrder(id){
  const o=orderById(id); if(!o) return;
  const cotizado=["espera_pago","preparacion","lista","en_ruta","entregada"].includes(o.status);
  const lines=o.items.map(it=>{
    const amt=lineAmount(it); const w=it.weigh&&it.weight!=null?` · ${it.weight} lb`:"";
    return `<div class="kv"><span class="k">${esc(it.name)}${it.available?'':' · <b style="color:#b03a3a">NO disponible</b>'}${it.available?w:''}</span><span class="v">${money(amt)}</span></div>`;
  }).join("");
  let actions="";
  if(o.status==="espera_pago"){
    actions=`<button class="btn red lg block" onclick="markPaid('${o.id}')">${ic('check',18)} Marcar pagado</button>
      <button class="btn ghost block sm btn-ic" style="margin-top:10px" onclick="returnToCotizar('${o.id}')">${ic('left',16)} Devolver a cotización</button>`;
  } else if(o.status==="lista"){
    actions=`<button class="btn lg block" onclick="sendRepartidor('${o.id}')">${ic('truck',18)} Generar ficha de repartidor</button>`;
  } else if(o.status==="en_ruta"){
    actions=`<button class="btn green lg block" onclick="markDelivered('${o.id}')">${ic('check',18)} Marcar entregada</button>`;
  } else if(o.status==="cotizar"){
    actions=`<div class="kempty">${ic('clock',16)} El carnicero está cotizando peso y precio.</div>`;
  } else if(o.status==="preparacion"){
    actions=`<div class="kempty">${ic('knife',16)} En preparación.</div>`;
  }
  const msg = waMessage(o);
  sheet(o, `
    ${lines}
    ${o.shipping?`<div class="kv"><span class="k">Subtotal productos</span><span class="v">${money(orderTotal(o))}</span></div>
    <div class="kv"><span class="k">${ic('truck',15)} Envío</span><span class="v">${money(o.shipping)}</span></div>`:""}
    <div class="total-bar"><span class="tl">Total${o.paid?' · PAGADO':''}</span><span class="tv">${money(fullTotal(o))}</span></div>
    ${cotizado? `
      <div class="sect-label" style="margin-top:6px">Mensaje para el cliente</div>
      <div class="msgbox" id="waBox">${esc(msg)}</div>
      <button class="btn ghost block" style="margin-top:8px" onclick="copy(document.getElementById('waBox').innerText);this.innerHTML='Copiado';">${ic('copy',16)} Copiar mensaje de WhatsApp</button>
    `:""}
    <div style="margin-top:14px">${actions}</div>
    <div class="admin-foot">
      ${o.status!=='cancelada'?`<button class="btn ghost block btn-ic" onclick="openAdminEdit('${o.id}')">${ic('edit',16)} Editar comanda</button>`:""}
      ${!["entregada","cancelada"].includes(o.status)?`<button class="btn ghost block sm" style="margin-top:10px;color:#b03a3a" onclick="cancelOrder('${o.id}')">Cancelar comanda</button>`:""}
    </div>
  `);
}
function waMessage(o){
  const av=o.items.filter(i=>i.available);
  const un=o.items.filter(i=>!i.available);
  let s='';
  av.forEach(it=>{ const q=(it.weigh&&it.weight!=null)?it.weight:it.qty;
    const nm=it.name.replace(/\s*\(paquete\)/i,'');
    s+=`${q} ${unitWord(it.unit,q)} de ${nm} .... ${moneyWA(lineAmount(it))}\n`; });
  un.forEach(it=>{ s+=`${it.name} .... hoy no disponible\n`; });
  s+=`\n*Subtotal: ${moneyWA(orderTotal(o))}*\n`;
  if(o.shipping){ s+=`\nEnvío .... ${moneyWA(o.shipping)}\n`; }
  s+=`\n*Total: ${moneyWA(fullTotal(o))}*\n`;
  s+=`\nEl pago puedes realizarlo a la siguiente cuenta bancaria.\n\n${PAY_INFO}`;
  return s;
}
function repartidorFicha(o){
  return `Cliente: ${o.clientName}\nTeléfono: ${o.phone||'—'}\nDirección: ${o.addr||o.zone||'—'}`;

function markPaid(id){ const o=orderById(id); o.paid=true; o.paidAt=Date.now(); setStatus(o,"preparacion"); save(); closeSheet(); toast("Pagado · pasó a preparación", ()=>revertStatus(id, x=>{x.paid=false; x.paidAt=null;})); }
function returnToCotizar(id){ const o=orderById(id); setStatus(o,"cotizar"); save(); closeSheet(); toast("Devuelta a cotización", ()=>revertStatus(id)); }
function sendRepartidor(id){ const o=orderById(id); const f=repartidorFicha(o);
  // open a sub view in sheet
  sheet(o,`<div class="sect-label" style="margin-top:0">Ficha para el repartidor</div>

    <button class="btn green lg block" style="margin-top:10px" onclick="confirmRuta('${o.id}')">${ic('truck',18)} Enviado al repartidor</button>`);

function confirmRuta(id){ const o=orderById(id); setStatus(o,"en_ruta"); save(); closeSheet(); toast("Comanda en ruta", ()=>revertStatus(id)); }
function markDelivered(id){ const o=orderById(id); setStatus(o,"entregada"); save(); closeSheet(); toast("Comanda entregada", ()=>revertStatus(id)); }

let editItems=null, editShipping=0, editComment='', activeEdit=null, adminEditMode=false;
const itemAmt=it=>{ if(!it.available||it.price==null) return 0; return (it.weigh?(it.weight||0):it.qty)*it.price; };
const editSubtotal=()=>editItems.reduce((s,it)=>s+itemAmt(it),0);
const editGrand=()=>editSubtotal()+(editShipping||0);
function openCarniceroOrder(id){
  const o=orderById(id); if(!o) return;

  const editable = (o.status==="cotizar" || o.status==="espera_pago");
  editItems=o.items.map(it=>({...it, weight: it.weight!=null?it.weight:(it.weigh?it.qty:null)}));
  editShipping=o.shipping||0; editComment=o.note||''; activeEdit=null;
  renderCarnOrder(o, !editable);
}
// ADMIN: editar cualquier comanda en cualquier estado (reusa el editor con numpad).
function openAdminEdit(id){
  const o=orderById(id); if(!o) return;

  editItems=o.items.map(it=>({...it, weight: it.weight!=null?it.weight:(it.weigh?it.qty:null)}));

  renderCarnOrder(o, false); // forzar editable
}
function guardarAdminEdit(){ persistEdits(); adminEditMode=false; closeCarn(); toast('Comanda actualizada'); }
function setComment(v){ editComment=v; }
function oitemRow(it,i,vo){

      r2=`<span class="lbl">Peso real</span>
        <button class="numbox ${activeEdit&&activeEdit.i===i&&activeEdit.field==='weight'?'active':''}" id="nb${i}" onclick="startEdit(${i},'weight')">${it.weight!=null?it.weight:'—'}<span class="nbu">lb</span></button>`;
    } else {
      r2=`<span class="lbl">Cantidad</span>
        <button class="numbox ${activeEdit&&activeEdit.i===i&&activeEdit.field==='qty'?'active':''}" id="nb${i}" onclick="startEdit(${i},'qty')">${it.qty}<span class="nbu">${unit}</span></button>`;
    }
    if(it.price==null){
      r2+=`<span class="lbl">Precio/lb</span>
        <button class="numbox ${activeEdit&&activeEdit.i===i&&activeEdit.field==='price'?'active':''}" id="pb${i}" onclick="startEdit(${i},'price')">L<span class="nbu">cotizar</span></button>`;
    }
  } else if(it.available && vo){
    r2=`<span class="lbl">${it.weigh?(it.weight!=null?it.weight+' lb':'—'):it.qty+' '+unit}</span>`;

        <div class="oitem-sub">Pedido: ${it.qty} ${it.unit==='Libra'?'lb':unit} · ${priceTxt}</div></div>
      <div class="oitem-amt" id="amt${i}">${it.available?money(itemAmt(it)):'—'}</div>
    </div>
    ${r2?`<div class="oitem-r2">${r2}</div>`:''}

function osumHtml(vo){
  return `<div class="osum">
    <div class="sr"><span class="sl">Subtotal productos</span><span class="sv" id="sumSub">${money(editSubtotal())}</span></div>
    <div class="sr ship"><span class="sl">${ic('truck',16)} Envío</span><span class="sv" id="sumShip" ${vo?'':`onclick="startEdit(-1,'ship')"`}>${money(editShipping||0)}</span></div>

function renderCarnOrder(o,vo){
  currentSheetId=o.id;
  let action='';
  if(adminEditMode) action=`<button class="btn red lg block btn-ic" onclick="guardarAdminEdit()">${ic('check',18)} Guardar cambios</button>`;
  else if(o.status==='cotizar') action=`<button class="btn red lg block btn-ic" onclick="confirmCotizarV2()">${ic('check',18)} Guardar y pasar a pago</button>`;
  else if(o.status==='espera_pago') action=`<button class="btn red lg block btn-ic" onclick="guardarV2()">${ic('check',18)} Guardar cambios</button>`;
  else if(o.status==='preparacion') action=`<button class="btn green lg block btn-ic" onclick="markReady('${o.id}')">${ic('check',18)} Marcar listo para entrega</button>`;
  const voNote = o.status==='preparacion'?'Pagado · pedido final, solo lectura':o.status==='lista'?'Lista para entrega · solo lectura':'Entregada · solo lectura';
  $("#overlayHost").innerHTML=`<div class="overlay osheet" onclick="if(event.target===this)closeCarn()">

      <button class="x" onclick="closeCarn()" aria-label="Cerrar">${ic('x',16)}</button></div>
      <div class="sheet-body" id="carnBody">
        ${vo?`<div class="viewonly-tag">${ic('eye',15)} ${voNote}</div>`:''}
        <div id="oitems">${editItems.map((it,i)=>oitemRow(it,i,vo)).join("")}</div>
        ${vo?'':`<button class="add-prod btn-ic" onclick="openAddProduct()">${ic('plus',18)} Agregar producto</button>`}
        ${vo

        ${osumHtml(vo)}
        ${action?`<div style="margin-top:6px">${action}</div>`:''}

function rerenderOitems(){ const el=$("#oitems"); if(el) el.innerHTML=editItems.map((it,i)=>oitemRow(it,i,false)).join(""); }
function togItem(i){ editItems[i].available=!editItems[i].available; if(activeEdit&&activeEdit.i===i){activeEdit=null;} persistEdits(); rerenderOitems(); updateSummary(); renderNumpadPop(); }
function updateSummary(){ const a=$("#sumSub"); if(a)a.textContent=money(editSubtotal());
  const sh=$("#sumShip"); if(sh)sh.textContent=money(editShipping||0);
  const g=$("#sumGrand"); if(g)g.textContent=money(editGrand()); }
function startEdit(i,field){
  const cur = field==='weight'?editItems[i].weight : field==='qty'?editItems[i].qty : field==='price'?editItems[i].price : editShipping;
  activeEdit={i,field,buffer:(cur!=null&&!isNaN(cur))?String(cur):'',fresh:true};
  rerenderOitems(); renderNumpadPop();
}
function renderNumpadPop(){
  const host=$("#numpadHost"); if(!host) return;
  if(!activeEdit){ host.innerHTML=''; return; }
  const it = activeEdit.i>=0?editItems[activeEdit.i]:null;
  const label = activeEdit.field==='weight'?'Peso · '+it.name : activeEdit.field==='qty'?'Cantidad · '+it.name
              : activeEdit.field==='price'?'Precio por libra · '+it.name : 'Costo de envío';
  const u = npUnit();
  host.innerHTML=`<div class="np-scrim" onclick="closeNumpad()"></div>
   <div class="np-pop" role="dialog" aria-label="Teclado numérico">
    <div class="np-head">
      <div><div class="np-label">${esc(label)}</div><div class="np-val" id="npVal">${(activeEdit.buffer||'0')+u}</div></div>
      <div style="text-align:right"><div class="np-label">Total del pedido</div><div class="np-val" id="npTotal">${money(editGrand())}</div></div>
    </div>
    <div class="np-grid">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="np-key" onclick="npTap('${n}')">${n}</button>`).join('')}
      <button class="np-key" onclick="npTap('.')">.</button>
      <button class="np-key" onclick="npTap('0')">0</button>
      <button class="np-key del" onclick="npTap('del')" aria-label="Borrar">${ic('back',26)}</button>
    </div>
    <button class="np-key ok" onclick="npTap('ok')">${ic('check',20)} Listo</button>
   </div>`;
}
function npUnit(){ if(!activeEdit) return ''; if(activeEdit.field==='weight') return ' lb';
  if(activeEdit.field==='qty'){ const it=editItems[activeEdit.i]; return ' '+(it.unit==='Unidad'?'u':it.unit==='Paquete'?'paq':it.unit==='Libra'?'lb':it.unit); }
  return ''; }
function npTap(ch){
  if(!activeEdit) return;
  if(ch==='ok'){ commitEdit(); return; }
  if(ch==='del'){ activeEdit.fresh=false; activeEdit.buffer=activeEdit.buffer.slice(0,-1); }
  else {
    if(activeEdit.fresh){ activeEdit.buffer=''; activeEdit.fresh=false; }
    if(ch==='.'){ if(!activeEdit.buffer.includes('.')) activeEdit.buffer+=(activeEdit.buffer===''?'0.':'.'); }
    else { activeEdit.buffer = (activeEdit.buffer==='0')?ch:activeEdit.buffer+ch; }
  }
  applyEdit();
}
function applyEdit(){
  const v=parseFloat(activeEdit.buffer); const val=isNaN(v)?0:v;
  if(activeEdit.field==='weight') editItems[activeEdit.i].weight=val;
  else if(activeEdit.field==='qty') editItems[activeEdit.i].qty=val;
  else if(activeEdit.field==='price') editItems[activeEdit.i].price=val;
  else editShipping=val;
  const nv=$("#npVal"); if(nv) nv.textContent=(activeEdit.buffer||'0')+npUnit();
  if(activeEdit.i>=0){
    const it=editItems[activeEdit.i];
    const bx=$("#nb"+activeEdit.i); if(bx && activeEdit.field!=='price') bx.childNodes[0].textContent=(activeEdit.buffer||'—');
    const pb=$("#pb"+activeEdit.i); if(pb && activeEdit.field==='price') pb.childNodes[0].textContent='L'+(activeEdit.buffer||'');
    const am=$("#amt"+activeEdit.i); if(am) am.textContent=money(itemAmt(it));
  }
  updateSummary();
  const nt=$("#npTotal"); if(nt) nt.textContent=money(editGrand());
}
function commitEdit(){
  persistEdits();
  if(activeEdit && activeEdit.field==='weight'){
    for(let j=activeEdit.i+1;j<editItems.length;j++){ if(editItems[j].available&&editItems[j].weigh){ startEdit(j,'weight'); return; } }
  }
  closeNumpad();
}
function closeNumpad(){ activeEdit=null; const h=$("#numpadHost"); if(h) h.innerHTML=''; rerenderOitems(); }
function persistEdits(){ const o=orderById(currentSheetId); if(!o) return;
  o.items=editItems.map(it=>({...it, weight: it.weigh?(it.weight!=null?it.weight:it.qty):null}));
  o.shipping=editShipping; o.note=editComment; save(); }
function confirmCotizarV2(){ const o=orderById(currentSheetId); const id=o.id; persistEdits(); setStatus(o,'espera_pago'); save(); closeCarn(); toast('Pasó a confirmación de pago', ()=>revertStatus(id)); }
function guardarV2(){ persistEdits(); closeCarn(); toast('Cambios guardados'); }
function markReady(id){ const o=orderById(id); if(!o) return; const prevLista=o.listaAt; o.listaAt=Date.now(); setStatus(o,'lista'); save(); closeCarn(); toast('Listo para entrega', ()=>revertStatus(id, x=>{x.listaAt=prevLista;})); }
function closeCarn(){ $("#overlayHost").innerHTML=''; const h=$("#numpadHost"); if(h) h.innerHTML=''; activeEdit=null; editItems=null; currentSheetId=null; adminEditMode=false; rerender(); }
/* add product mid-process */
let addCat="Res";
function openAddProduct(){
  closeNumpad();
  $("#overlayHost").insertAdjacentHTML('beforeend',`<div class="overlay" id="addOv" onclick="if(event.target===this)closeAdd()">
    <div class="sheet" style="max-width:560px"><div class="sheet-head"><span class="sh-name">Agregar producto</span><button class="x" onclick="closeAdd()">${ic('x',16)}</button></div>
    <div class="sheet-body"><div class="cat-tabs" id="addTabs"></div><div class="prod-grid" id="addGrid"></div></div></div></div>`);
  renderAddGrid();
}
function renderAddGrid(){
  const t=$("#addTabs"); if(t) t.innerHTML=CAT.map(g=>`<button class="${addCat===g.cat?'on':''}" onclick="addCat='${g.cat}';renderAddGrid()">${g.cat}</button>`).join('');
  const g=$("#addGrid"); if(!g) return;
  g.innerHTML=PRODUCTS.filter(p=>p.cat===addCat).map(p=>`<button class="pchip" onclick="pickAdd('${p.id}')"><div class="pn">${esc(p.name)}</div><div class="pp">${p.price==null?'a cotizar':money(p.price)}<span class="pu"> /${p.unit==='Libra'?'lb':p.unit==='Unidad'?'u':p.unit}</span></div></button>`).join('');
}
function pickAdd(id){ const p=prodById(id);
  editItems.push({prodId:p.id,name:p.name,unit:p.unit,price:p.price,weigh:p.weigh,qty:1,available:true,weight:p.weigh?1:null,note:''});
  persistEdits(); closeAdd(); rerenderOitems(); updateSummary(); toast(p.name+' agregado'); }
function closeAdd(){ const a=$("#addOv"); if(a) a.remove(); }

/* ================= SHEET ================= */
let currentSheetId=null;
function sheet(o,bodyHtml,titleOverride){
  currentSheetId=o.id;
  $("#overlayHost").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeSheet()">
    <div class="sheet"><div class="sheet-head">
      <span class="sh-folio">#${o.folio}</span>
      <span class="sh-name">${esc(o.clientName)}</span>
      ${!titleOverride?`<span class="chip ${CHIP[o.status]}" style="margin-left:4px">${STATUS[o.status]}</span>`:''}
      <button class="x" onclick="closeSheet()">${ic('x',16)}</button>
    </div><div class="sheet-body">${bodyHtml}</div></div></div>`;
}
function closeSheet(){ $("#overlayHost").innerHTML=""; currentSheetId=null; editItems=null; rerender(); }

/* ============ INIT ============ */
if(window.supabase && SUPA_URL){ initSupa().catch(e=>{ console.warn('Supabase init falló, modo local:',e); load(); archiveStaleListas(); }); }
else { load(); archiveStaleListas(); }
</script>
</body>
</html>
